name: Bug report
description: Something in the boilerplate is broken or behaves unexpectedly.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill in as much as you can —
        a minimal reproduction is the single most useful thing you can provide.

        For **security vulnerabilities**, do **not** open a public issue. See
        [SECURITY.md](../blob/main/SECURITY.md) instead.

  - type: input
    id: summary
    attributes:
      label: Summary
      description: One-line description of the problem.
      placeholder: e.g. "Electron renderer OTA fails to apply on Windows"
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal sequence that triggers the bug.
      placeholder: |
        1. `npm run dev`
        2. Open https://localhost:3000
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include error messages, stack traces, or screenshots if relevant.
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      multiple: true
      options:
        - Web (browser)
        - iOS (Capacitor)
        - Android (Capacitor)
        - Electron (macOS)
        - Electron (Windows)
        - Electron (Linux)
        - Server (Hono)
        - Build / CI
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node version
      placeholder: e.g. 22.11.0
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS / OS version
      placeholder: e.g. macOS 14.5, Windows 11, Ubuntu 24.04
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Anything else worth knowing — recent changes, relevant logs, suspected cause.
