name: Feature request
description: Propose a new capability or milestone for the boilerplate.
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Vitronitor is a boilerplate, so feature proposals should generalize to
        any downstream user, not just one project's needs. See
        [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md#whats-in-scope) for what's
        in scope.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What's the user-facing pain or gap this would address? Lead with the problem, not the solution.
      placeholder: e.g. "Push notifications aren't supported — every downstream project has to wire them up from scratch."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Sketch the approach. Files to add, surface to expose, design trade-offs you considered.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you ruled out and why.

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - Web only
        - Capacitor (iOS / Android)
        - Electron
        - Server / API
        - Build / CI / tooling
        - Cross-cutting (multiple)
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Links, references, prior art, related issues.
